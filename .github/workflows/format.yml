name: Black and Isort Formatter

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort
    - name: Check imports with Isort (Diff Mode)
      run: |
        isort . --profile=black --line-length=150 --diff
    - name: Check code with Black (Diff Mode)
      run: |
        black . --line-length=150 --target-version py310 --diff
    - name: Format imports with Isort
      run: |
        isort . --profile=black --line-length=150
    - name: Format code with Black
      run: |
        black . --line-length=150 --target-version py310
    - name: Commit and push changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "chore(format): run black and isort on ${{ github.ref_name }}"
        git push origin ${{ github.ref_name }}
      continue-on-error: true  # 防止未修改时 git commit 失败
